<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁あり対戦ブロスタ風</title>
<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:sans-serif;text-align:center}
canvas{background:#1a1a1a;display:block;margin:10px auto;border:3px solid #555}
#ui{width:600px;margin:0 auto;display:flex;justify-content:space-between}
.bar{height:10px;background:#444;border-radius:5px;overflow:hidden}
.fill{height:100%}
</style>
</head>
<body>
<h2>🧱 壁あり対戦ブロスタ風</h2>
<div id="ui">
<div>あなた❤️<div class="bar"><div id="p1" class="fill" style="background:#0f0"></div></div></div>
<div>敵❤️<div class="bar"><div id="p2" class="fill" style="background:#f00"></div></div></div>
</div>
<canvas id="game" width="600" height="400"></canvas>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
let mouse={x:300,y:200};
c.onmousemove=e=>{let r=c.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top};

const keys={};
document.onkeydown=e=>keys[e.key.toLowerCase()]=true;
document.onkeyup=e=>keys[e.key.toLowerCase()]=false;

let p1={x:100,y:200,size:15,hp:100,cd:0};
let p2={x:500,y:200,size:15,hp:100,cd:0};
let bullets=[];

// 壁
let walls=[
 {x:200,y:100,w:50,h:200},
 {x:350,y:50,w:50,h:200}
];

function collideWall(obj){
 return walls.some(w=>
  obj.x > w.x && obj.x < w.x+w.w &&
  obj.y > w.y && obj.y < w.y+w.h
 );
}

function shoot(shooter,target){
 if(shooter.cd>0)return;
 let dx=target.x-shooter.x,dy=target.y-shooter.y,d=Math.hypot(dx,dy);
 bullets.push({x:shooter.x,y:shooter.y,dx:dx/d*5,dy:dy/d*5,owner:shooter});
 shooter.cd=20;
}

function moveWithWall(p,dx,dy){
 let nx=p.x+dx, ny=p.y+dy;
 if(!collideWall({x:nx,y:p.y})) p.x=nx;
 if(!collideWall({x:p.x,y:ny})) p.y=ny;
}

function update(){
 // プレイヤー移動（壁判定付き）
 if(keys["w"])moveWithWall(p1,0,-3);
 if(keys["s"])moveWithWall(p1,0,3);
 if(keys["a"])moveWithWall(p1,-3,0);
 if(keys["d"])moveWithWall(p1,3,0);
 if(keys[" "])shoot(p1,mouse);

 // 敵AI（壁回避しながら追う）
 let dx=p1.x-p2.x,dy=p1.y-p2.y,d=Math.hypot(dx,dy);
 let vx=dx/d*1.5, vy=dy/d*1.5;
 moveWithWall(p2,vx,vy);
 if(Math.random()<0.02)shoot(p2,p1);

 if(p1.cd>0)p1.cd--;
 if(p2.cd>0)p2.cd--;

 bullets.forEach((b,bi)=>{
  b.x+=b.dx;b.y+=b.dy;

  // 壁に当たったら消える
  if(collideWall(b)){
    bullets.splice(bi,1);
    return;
  }

  let target=(b.owner===p1)?p2:p1;
  if(Math.hypot(b.x-target.x,b.y-target.y)<target.size){
    target.hp-=5;
    bullets.splice(bi,1);
  }
 });

 document.getElementById("p1").style.width=p1.hp+"%";
 document.getElementById("p2").style.width=p2.hp+"%";

 if(p1.hp<=0){alert("負け…");location.reload();}
 if(p2.hp<=0){alert("勝ち！");location.reload();}
}

function draw(){
 ctx.clearRect(0,0,600,400);

 // 壁描画
 ctx.fillStyle="#777";
 walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

 // プレイヤー
 ctx.fillStyle="#0af";
 ctx.beginPath();ctx.arc(p1.x,p1.y,p1.size,0,6.28);ctx.fill();

 // 敵
 ctx.fillStyle="#f33";
 ctx.beginPath();ctx.arc(p2.x,p2.y,p2.size,0,6.28);ctx.fill();

 // 弾
 ctx.fillStyle="#ff0";
 bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,4,0,6.28);ctx.fill()});

 // 照準
 ctx.strokeStyle="#fff";
 ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
